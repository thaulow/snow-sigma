# CloudNativePG PostgreSQL Cluster for snow-ns9999k
# =================================================
# Prerequisites:
#   1. CloudNativePG operator must be installed cluster-wide:
#      kubectl apply -f https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.23/releases/cnpg-1.23.0.yaml
#
#   2. Bootstrap secret must exist before applying this manifest.
#      Created by the CI "Create postgres credentials" job.
#
# After applying, the operator auto-creates:
#   - Secret: snow-postgres-app (username + password keys)
#   - Service: snow-postgres-rw  (read-write, points to primary)
#   - Service: snow-postgres-ro  (read-only, points to replicas)
#
# Apply via CI "Deploy PostgreSQL" job, or manually:
#   kubectl apply -f postgres.yaml -n snow-ns9999k

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: snow-postgres
  namespace: snow-ns9999k
spec:
  instances: 1  # Increase to 3 for HA

  imageName: ghcr.io/cloudnative-pg/postgresql:16.4

  bootstrap:
    initdb:
      database: waldur
      owner: waldur
      secret:
        name: snow-postgres-credentials  # Created by CI setup job

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"

  storage:
    size: 50Gi
    # storageClass: ""  # Leave empty to use cluster default, or specify e.g. "ceph-rbd"

  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
