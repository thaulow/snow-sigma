# Sigma2 Snow Deployment Pipeline
# ==================================
# Deploys Waldur (snow.sigma2.no) from the local chart (waldur/) with Sigma2 values.
#
# Stages:
#   test   - Lint and validate the chart (runs on MR and main)
#   setup  - One-time cluster setup jobs (manual, main only)
#   deploy - Deploy/upgrade to the cluster (manual, main only)
#
# Required GitLab CI variables (Settings > CI/CD > Variables):
#   WALDUR_SECRET_KEY  - Django secret key            (masked, protected)
#   RMQ_PASSWORD       - RabbitMQ password            (masked, protected)
#   DB_PASSWORD        - PostgreSQL password          (masked, protected)

image: sigma2as/nird-deploy:latest

variables:
  KUBE_NAMESPACE: snow-ns9999k
  SOURCE_NAMESPACE: waldur-ns9999k

stages:
  - test
  - setup
  - deploy

# ---------------------------------------------------------------------------
# TEST STAGE
# ---------------------------------------------------------------------------

Lint chart:
  stage: test
  script:
    - helm dependency update waldur/
    - helm lint waldur/
    - helm lint waldur/ -f values.yaml
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  tags:
    - sp

Validate templates:
  stage: test
  script:
    - helm dependency update waldur/
    - helm template waldur waldur/ -f values.yaml --debug > /dev/null
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'
  tags:
    - sp

# ---------------------------------------------------------------------------
# SETUP STAGE (one-time, manual)
# Run once before the first deploy.
# ---------------------------------------------------------------------------

.setup-common: &setup-common
  stage: setup
  before_script:
    - kubectl config use-context nird/lmd-agent:lmd-agent
  when: manual
  only:
    - main
  tags:
    - sp

Copy wildcard TLS secret:
  <<: *setup-common
  script:
    # Copy wildcard TLS certificate from the source namespace
    - |
      kubectl get secret wildcard-tls -n $SOURCE_NAMESPACE -o json \
        | jq 'del(.metadata.resourceVersion, .metadata.uid, .metadata.creationTimestamp, .metadata.annotations, .metadata.managedFields) | .metadata.namespace = "'$KUBE_NAMESPACE'"' \
        | kubectl apply -f -

# ---------------------------------------------------------------------------
# DEPLOY STAGE
# ---------------------------------------------------------------------------

Deploy waldur:
  stage: deploy
  script:
    - kubectl config get-contexts
    - kubectl config use-context nird/lmd-agent:lmd-agent
    - helm dependency update waldur/
    - kubectl delete job waldur-mastermind-init-whitelabeling-job -n $KUBE_NAMESPACE || true
    - kubectl delete job load-features-job -n $KUBE_NAMESPACE || true
    - |
      helm upgrade --install waldur waldur/ \
        -f values.yaml \
        --set waldur.secretKey="$WALDUR_SECRET_KEY" \
        --set postgresql.auth.password="$DB_PASSWORD" \
        --set rabbitmq.auth.password="$RMQ_PASSWORD" \
        -n $KUBE_NAMESPACE \
        --timeout 10m0s
    - kubectl rollout restart deployment waldur-mastermind-beat -n $KUBE_NAMESPACE
    - kubectl rollout restart deployment waldur-mastermind-api -n $KUBE_NAMESPACE
    - kubectl rollout restart deployment waldur-mastermind-worker -n $KUBE_NAMESPACE
    - kubectl rollout restart deployment waldur-homeport -n $KUBE_NAMESPACE
  environment:
    name: production
    url: https://snow.sigma2.no
  when: manual
  only:
    - main
  tags:
    - sp
